<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Event Photo Pages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="admin.html" class="brand">Event<span>Photo</span> <span class="badge" style="font-size: 0.65rem; vertical-align: middle">Admin</span></a>
      <nav style="display: flex; gap: 0.5rem; flex-wrap: wrap">
        <a href="dashboard.html" class="btn btn--ghost btn--small">User dashboard</a>
        <button type="button" class="btn btn--ghost btn--small" id="btn-logout">Log out</button>
      </nav>
    </header>
    <main class="container container--wide">
      <div class="card">
        <h2 style="margin-top: 0">Users</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </div>
      <div class="card mt-2">
        <h2 style="margin-top: 0">Events</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Slug</th>
                <th>Owner</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="events-body"></tbody>
          </table>
        </div>
      </div>
      <p class="muted mt-2" style="font-size: 0.85rem">
        Demo admin panel — data is stored in browser localStorage only.
      </p>
    </main>
    <script src="js/store.js"></script>
    <script src="js/session.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
